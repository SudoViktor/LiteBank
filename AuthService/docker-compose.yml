version: '3.8'

services:
  api:
    build: .
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://accounts_user:accounts_pass123@host.docker.internal:5432/accounts_db
    command: sh -c "alembic upgrade head && alembic revision --autogenerate -m "-" && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app