<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteBank Web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="auth-view" class="view-container active">
            <div class="auth-box">
                <h1 id="auth-title">Вхід у LiteBank</h1>
                <div id="alert-box" class="alert hidden"></div>
                <form id="auth-form">
                    <div class="input-group">
                        <label for="username">Логін</label>
                        <input type="text" id="username" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" id="auth-submit-btn">Увійти</button>
                </form>
                <p class="toggle-text">
                    <span id="auth-toggle-msg">Ще немає акаунту?</span> 
                    <a href="#" id="auth-toggle-link">Зареєструватися</a>
                </p>
            </div>
        </div>

        <div id="dashboard-view" class="view-container hidden">
            <nav class="navbar">
                <div class="nav-brand">LiteBank <span>Web</span></div>
                <div class="nav-controls">
                    <span id="user-greeting" class="user-greeting"></span>
                    <button id="logout-btn" class="btn-outline">Вийти</button>
                </div>
            </nav>
            
            <main class="dashboard-content">
                <div class="carousel-wrapper">
                    <button id="prev-slide" class="carousel-nav-btn">&lt;</button>
                    <div id="carousel-content" class="carousel-content">
                        <p class="text-muted" style="text-align: center; margin-top: 50px;">Завантаження...</p>
                    </div>
                    <button id="next-slide" class="carousel-nav-btn">&gt;</button>
                </div>
                <div id="carousel-dots" class="carousel-dots"></div>
            </main>
        </div>
    </div>

    <div id="card-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Керування карткою</h3>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <div id="card-modal-body">
                </div>
        </div>
    </div>

    <div id="transfer-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Переказ за IBAN</h3>
                <button id="close-transfer-btn" class="close-btn">&times;</button>
            </div>
            
            <div id="transfer-alert" class="alert hidden"></div>

            <form id="transfer-form">
                <input type="hidden" id="transfer-from-iban">
                
                <div class="input-group">
                    <label>З рахунку</label>
                    <input type="text" id="transfer-from-display" disabled style="background-color: #f8f9fa; color: #888;">
                </div>
                
                <div class="input-group">
                    <label>IBAN отримувача</label>
                    <input type="text" id="transfer-to-iban" required placeholder="UA000000000000000000000000000" maxlength="29" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Сума (UAH)</label>
                    <input type="number" step="0.01" min="1" id="transfer-amount" required placeholder="100.00">
                </div>
                
                <button type="submit" id="transfer-submit-btn" class="btn-primary" style="margin-top: 10px;">Відправити гроші</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
