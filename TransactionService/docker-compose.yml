version: '3.8'

services:
  api:
    build: .
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://transactions_user:transactions_pass123@host.docker.internal:5432/transactions_db
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app